name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: bash scripts/check-service-role-leak.sh
      - run: pnpm -r lint
      - run: pnpm -r typecheck
      - run: pnpm --filter web build
        env:
          # Dummies só para o build compilar — nenhum valor real.
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy

  rls-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Sobe Postgres + Auth + PostgREST locais e aplica as migrações. O CLI
      # vem da devDependency do workspace (versão pinada pelo lockfile) — a
      # action setup-cli resolvia "latest" pela API do GitHub e quebrava com
      # rate limit.
      - run: pnpm exec supabase start -x studio,imgproxy,edge-runtime
      # O CLI recente emite valores entre aspas (API_URL="http://…"); sem
      # remover, as aspas viram parte do valor no $GITHUB_ENV e o client falha
      # com "Invalid supabaseUrl".
      - run: pnpm exec supabase status -o env | sed -E 's/^([A-Za-z_]+)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
      - run: pnpm vitest run --config supabase/tests/vitest.config.ts
