<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Briefing — {{DATA}}</title>
<style>
  :root {
    --bg: #0A0A0B;
    --card: #16161A;
    --card-2: #1C1C22;
    --gold: #D4AF37;
    --text: #E8E8E8;
    --muted: #8A8A92;
    --border: #2A2A30;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 48px 32px;
    max-width: 800px;
    margin: 0 auto;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
    margin-bottom: 40px;
  }
  .label {
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  h2 {
    font-size: 14px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin: 48px 0 20px;
  }
  .news-item, .post-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .news-item h3, .post-item h3 {
    font-size: 18px;
    margin-bottom: 12px;
  }
  .meta {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 12px;
  }
  .score {
    display: inline-block;
    background: var(--gold);
    color: #000;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin-left: 8px;
  }
  .summary {
    color: var(--text);
    margin-bottom: 12px;
  }
  .why {
    color: var(--gold);
    font-size: 14px;
    border-left: 2px solid var(--gold);
    padding-left: 12px;
  }
  .post-format {
    display: inline-block;
    background: var(--card-2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .hook {
    font-size: 16px;
    font-weight: 500;
    margin: 12px 0;
  }
  ul.structure {
    list-style: none;
    padding-left: 0;
  }
  ul.structure li {
    padding: 8px 0;
    color: var(--muted);
    font-size: 14px;
    border-bottom: 1px solid var(--border);
  }
  ul.structure li:last-child { border: none; }
  a { color: var(--gold); text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer {
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
</style>
</head>
<body>
  <header>
    <div class="label">Briefing Empresarial</div>
    <h1>{{DATA}}</h1>
  </header>

  <h2>📰 Notícias do Dia</h2>
  {{NOTICIAS}}

  <h2>✍️ Sugestões de Post</h2>
  {{POSTS}}

  <footer>
    Briefing gerado automaticamente · {{TIMESTAMP}}
  </footer>
</body>
</html>
